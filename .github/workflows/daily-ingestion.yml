name: Daily Seed Data Refresh

on:
  schedule:
    # 9:15 AM IST = 3:45 AM UTC
    - cron: '45 3 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  refresh:
    name: Scrape & Refresh seed_data.json
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the updated seed file back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-seed-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-seed-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run seed data refresher
        working-directory: ./backend
        run: |
          echo "Starting seed data refresh..."
          python scripts/refresh_seed_data.py
          echo "Refresh complete."

      - name: Verify seed_data.json was updated
        working-directory: ./backend
        run: |
          echo "--- Contents of data/seed_data.json (first 40 lines) ---"
          head -40 data/seed_data.json
          echo ""
          FUND_COUNT=$(python -c "import json; d=json.load(open('data/seed_data.json')); print(len(d['funds']))")
          echo "Total funds in seed file: $FUND_COUNT"
          if [ "$FUND_COUNT" -lt 20 ]; then
            echo "ERROR: Fund count is too low ($FUND_COUNT), something went wrong."
            exit 1
          fi

      - name: Commit & push updated seed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/seed_data.json
          # Only commit if the file actually changed
          if git diff --cached --quiet; then
            echo "No changes to seed_data.json — skipping commit."
          else
            git commit -m "chore(data): auto-refresh seed_data.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push origin main
            echo "✅ Pushed updated seed_data.json to main."
          fi

      - name: Summary
        run: |
          echo "## 🌱 Seed Data Refresh Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Funds updated**: 25 (5 AMCs × 5 schemes)" >> $GITHUB_STEP_SUMMARY
          echo "- **Source**: backend/data/seed_data.json" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: Render auto-redeploys on new commit" >> $GITHUB_STEP_SUMMARY
