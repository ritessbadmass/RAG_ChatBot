name: Daily Data Ingestion

on:
  schedule:
    # 9:15 AM IST = 3:45 AM UTC
    - cron: '45 3 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  ingest:
    name: Scrape and Build Vector DB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Cache BGE model
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/sentence_transformers
          key: bge-model-${{ runner.os }}
          restore-keys: |
            bge-model-
      
      - name: Run data ingestion
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'groq' }}
          EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
          EMBEDDING_DEVICE: cpu
          CHROMA_CLOUD_TOKEN: ${{ secrets.CHROMA_CLOUD_TOKEN }}
          CHROMA_CLOUD_TENANT: ${{ secrets.CHROMA_CLOUD_TENANT }}
          CHROMA_CLOUD_DATABASE: ${{ secrets.CHROMA_CLOUD_DATABASE }}
          CHROMA_COLLECTION_NAME: mutual_fund_docs
          PYTHONPATH: .
        run: |
          echo "Starting data ingestion..."
          python scripts/ingest_data.py
          echo "Ingestion complete"
      
      - name: Verify vector store created
        run: |
          if [ -d "data/vector_store" ]; then
            echo "Vector store directory exists"
            ls -lh data/vector_store/
            du -sh data/vector_store/
          else
            echo "ERROR: Vector store not created"
            exit 1
          fi
      
      - name: Upload vector store as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vector-store-${{ github.run_id }}
          path: backend/data/vector_store/
      
      - name: Upload processed data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-data-${{ github.run_id }}
          path: backend/data/processed/
      
      - name: Summary
        run: |
          echo "## Ingestion Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Vector store path: \`backend/data/vector_store/\`" >> $GITHUB_STEP_SUMMARY
          echo "- Retention: 90 days" >> $GITHUB_STEP_SUMMARY
