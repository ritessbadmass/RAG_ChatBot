name: Deploy to Chroma Cloud

on:
  workflow_run:
    workflows: ["Daily Data Ingestion"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy-to-chroma-cloud:
    name: Upload Vectors to Chroma Cloud
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download vector store artifact
        uses: actions/download-artifact@v4
        with:
          name: vector-store-${{ github.event.workflow_run.id }}
          path: ./data/vector_store/
        continue-on-error: true
      
      - name: Upload to Chroma Cloud
        if: success()
        env:
          CHROMA_CLOUD_HOST: ${{ secrets.CHROMA_CLOUD_HOST }}
          CHROMA_CLOUD_TOKEN: ${{ secrets.CHROMA_CLOUD_TOKEN }}
          CHROMA_COLLECTION_NAME: mutual_fund_docs
        run: |
          echo "Uploading vectors to Chroma Cloud..."
          python scripts/upload_to_chroma_cloud.py
      
      - name: Summary
        run: |
          echo "## Chroma Cloud Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Vectors uploaded to Chroma Cloud successfully" >> $GITHUB_STEP_SUMMARY
